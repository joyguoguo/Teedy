hibernate.connection.driver_class=org.h2.Driver
# Dev previously used an in-memory DB (jdbc:h2:mem) which is lost on restart.
# Persist DB on disk under docs.home so documents remain after server restart.
hibernate.connection.url=jdbc:h2:file:${docs.home}/db/docs;CACHE_SIZE=65536;LOCK_TIMEOUT=10000;AUTO_SERVER=TRUE
hibernate.connection.username=sa
hibernate.connection.password=
hibernate.hbm2ddl.auto=
hibernate.dialect=org.hibernate.dialect.HSQLDialect
hibernate.show_sql=false
hibernate.format_sql=false
hibernate.max_fetch_depth=5
hibernate.cache.use_second_level_cache=false
hibernate.connection.initial_pool_size=1
hibernate.connection.pool_size=10
hibernate.connection.pool_validation_interval=5
